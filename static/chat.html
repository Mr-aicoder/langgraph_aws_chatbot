<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chat</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #3b82f6;
      --user: #2563eb;
      --bot: #334155;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 0.75rem 1rem;
      background: var(--panel);
      border-bottom: 1px solid #2d3a4f;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    header h1 { margin: 0; font-size: 1.1rem; font-weight: 600; }
    header a { color: var(--muted); font-size: 0.85rem; }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
    }
    .msg {
      max-width: 90%;
      padding: 0.65rem 0.9rem;
      border-radius: 12px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: var(--user);
      color: #fff;
    }
    .msg.bot {
      align-self: flex-start;
      background: var(--bot);
      border: 1px solid #475569;
    }
    .msg.error {
      align-self: stretch;
      background: #7f1d1d;
      border: 1px solid #b91c1c;
      color: #fecaca;
    }
    .msg.loading { opacity: 0.7; font-style: italic; }
    form {
      padding: 0.75rem 1rem 1rem;
      background: var(--panel);
      border-top: 1px solid #2d3a4f;
      display: flex;
      gap: 0.5rem;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
    }
    #input {
      flex: 1;
      padding: 0.65rem 0.85rem;
      border-radius: 10px;
      border: 1px solid #3d4f66;
      background: var(--bg);
      color: var(--text);
      font-size: 1rem;
    }
    #input:focus {
      outline: 2px solid var(--accent);
      border-color: transparent;
    }
    button {
      padding: 0.65rem 1.1rem;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      font-size: 1rem;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button:hover:not(:disabled) { filter: brightness(1.08); }
  </style>
</head>
<body>
  <header>
    <h1>Groq chatbot</h1>
    <a href="/docs">API docs</a>
  </header>
  <div id="messages" aria-live="polite"></div>
  <form id="form">
    <input id="input" type="text" placeholder="Type a message…" autocomplete="off" autofocus />
    <button type="submit" id="send">Send</button>
  </form>
  <script>
    const messagesEl = document.getElementById("messages");
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");

    /** @type {{role: string, content: string}[]} */
    let history = [];

    function addBubble(text, role) {
      const div = document.createElement("div");
      div.className = "msg " + role;
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;

      input.value = "";
      addBubble(text, "user");
      const loading = addBubble("Thinking…", "bot loading");
      sendBtn.disabled = true;

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            message: text,
            history: history,
          }),
        });
        const data = await res.json().catch(() => ({}));
        loading.remove();
        if (!res.ok) {
          const detail = data.detail != null
            ? (typeof data.detail === "string" ? data.detail : JSON.stringify(data.detail))
            : res.statusText;
          addBubble("Error: " + detail, "error");
          return;
        }
        const reply = data.response ?? "(empty reply)";
        history.push({ role: "user", content: text });
        history.push({ role: "assistant", content: reply });
        addBubble(reply, "bot");
      } catch (err) {
        loading.remove();
        addBubble("Network error: " + err.message, "error");
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    });
  </script>
</body>
</html>
